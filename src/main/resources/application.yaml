spring:
  application:
    name: learnmate
  datasource:
    url: jdbc:postgresql://localhost:5432/learnmatedb
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB

jwt:
  secretKey: secret

springdoc:
  swagger-ui:
    path: /docs

file:
  audios:
    upload-dir: /documents/learnmate/audios/
