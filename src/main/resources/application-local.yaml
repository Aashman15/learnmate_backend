spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/learnmate
    username: postgres
    password: password
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:  http://localhost:8080/realms/learnmate

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB

springdoc:
  swagger-ui:
    path: /docs

jwt:
  secretKey: secret

file:
  audios:
    upload-dir: /documents/learnmate/audios/

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    org.springframework.web: DEBUG
